<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja do Rodrigo Augusto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9dbdb;

            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background-color: #000000;
            color: rgb(255, 255, 255);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            margin: 0;
            font-size: 20px;
        }

        .nav-links a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
            font-size: 14px;
        }

        /* CONTAINER (AGORA FLEX IGUAL AO OUTRO SITE) */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            padding: 40px;

            max-width: 900px;
            margin: 0 auto;
        }

        /* CARD NOVO ESTILO (GLASS) */
        .card {
            width: 260px;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .card h3 {
            margin-bottom: 10px;
            color: #3e2f26;
            height: 5%;
        }

        .card button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #a67c52;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .card button:hover {
            background: #8c6239;
            transform: scale(1.08);
        }

        /* RESPONSIVO */
        @media (max-width: 600px) {
            .container {
                gap: 15px;
                padding: 20px;
            }

            .card {
                width: calc(50% - 40px);
                /* 🔥 garante 2 por linha */
            }
        }

        /* FOOTER */
        .footer {
            background-color: #6b4f3b;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
        }

        .social-icons {
            margin-top: 10px;
        }

        .social-icons a {
            color: white;
            font-size: 22px;
            margin: 0 10px;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: #d2b48c;
            transform: scale(1.2);
        }

        button{font-family: monospace;}
    </style>
</head>
